<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #eef1f8; background: #0b0d12; position: relative;
  }
  .aurora { position: absolute; inset: 0; overflow: hidden; }
  .aurora span { position: absolute; border-radius: 50%; filter: blur(90px); display: block; }
  .a1 { width: 760px; height: 760px; left: -180px; top: -240px; background: radial-gradient(circle, #6d5efc, transparent 60%); opacity: .60; }
  .a2 { width: 660px; height: 660px; right: -180px; top: -140px; background: radial-gradient(circle, #35d0f0, transparent 60%); opacity: .42; }
  .a3 { width: 720px; height: 720px; left: 220px; bottom: -360px; background: radial-gradient(circle, #a35bff, transparent 60%); opacity: .5; }
  .wrap { position: relative; height: 100%; display: flex; align-items: center; justify-content: space-between; padding: 70px 84px; }
  .left { max-width: 640px; }
  .logo {
    width: 92px; height: 92px; border-radius: 25px; display: flex; align-items: center; justify-content: center;
    color: #fff; margin-bottom: 30px;
    background: linear-gradient(140deg, #6d5efc, #a35bff 55%, #35d0f0);
    box-shadow: 0 20px 50px rgba(109, 94, 252, .5), inset 0 1px 0 rgba(255,255,255,.35);
  }
  h1 { font-size: 80px; font-weight: 850; letter-spacing: -.03em; line-height: 1.0; margin-bottom: 24px; }
  h1 .arrow { background: linear-gradient(90deg, #9b93ff, #35d0f0); -webkit-background-clip: text; background-clip: text; color: transparent; }
  p.tag { font-size: 33px; line-height: 1.32; color: #c9cfdd; margin-bottom: 34px; font-weight: 500; }
  .pills { display: flex; gap: 12px; flex-wrap: wrap; }
  .pill {
    font-size: 22px; font-weight: 650; color: #b9c1d2;
    background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.11);
    padding: 10px 18px; border-radius: 12px;
  }
  .right { position: relative; }
  .qrcard {
    width: 328px; height: 328px; background: #fff; border-radius: 38px;
    display: flex; align-items: center; justify-content: center; position: relative;
    box-shadow: 0 34px 80px rgba(0,0,0,.5);
  }
  .qrcard::before {
    content: ""; position: absolute; inset: -4px; border-radius: 42px; z-index: -1;
    background: linear-gradient(135deg, #6d5efc, #35d0f0); filter: blur(11px); opacity: .95;
  }
  canvas { display: block; }
  .url {
    position: absolute; bottom: 42px; left: 84px; font-size: 25px; color: #8b93a6; font-weight: 600;
    letter-spacing: .01em;
  }
</style>
</head>
<body>
  <div class="aurora"><span class="a1"></span><span class="a2"></span><span class="a3"></span></div>
  <div class="wrap">
    <div class="left">
      <div class="logo">
        <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h15M13 6l6 6-6 6"/></svg>
      </div>
      <h1>UPN <span class="arrow">&#8594;</span> SEPA QR</h1>
      <p class="tag">Turn a Slovenian bill's payment QR into one you can pay from N26, Wise, bunq &amp; other EU banking apps.</p>
      <div class="pills">
        <span class="pill">📷 Scan · screenshot · paste</span>
        <span class="pill">🔒 100% on-device</span>
      </div>
    </div>
    <div class="right"><div class="qrcard"><canvas id="qr" width="252" height="252"></canvas></div></div>
  </div>
  <div class="url">vasjab.github.io/upn-to-sepa-qr</div>

  <script src="vendor/qrcode-generator.js"></script>
  <script>
    // A real, scannable QR of the site URL as the visual.
    qrcode.stringToBytes = qrcode.stringToBytesFuncs['UTF-8'];
    var q = qrcode(0, 'M'); q.addData('https://vasjab.github.io/upn-to-sepa-qr/', 'Byte'); q.make();
    var n = q.getModuleCount(), cv = document.getElementById('qr'), ctx = cv.getContext('2d');
    var quiet = 1, scale = Math.floor(cv.width / (n + quiet * 2));
    var off = Math.floor((cv.width - (n + quiet * 2) * scale) / 2);
    ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, cv.width, cv.height);
    ctx.fillStyle = '#0b0d12';
    for (var r = 0; r < n; r++) for (var c = 0; c < n; c++) if (q.isDark(r, c))
      ctx.fillRect(off + (c + quiet) * scale, off + (r + quiet) * scale, scale, scale);
  </script>
</body>
</html>
